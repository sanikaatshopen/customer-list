<!-- ============================================ -->
<!--  Root Component — Navbar + Router Outlet     -->
<!-- ============================================ -->

<!-- Navbar (shown only when logged in) -->
@if (auth.isLoggedIn()) {
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary-theme shadow-sm mb-4">
    <div class="container">
      <a class="navbar-brand fw-bold" routerLink="/customers">
        <i class="bi bi-person-lines-fill me-2"></i>Customer List
      </a>

      <!-- Hamburger menu for mobile to open Offcanvas -->
      <button class="navbar-toggler d-lg-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#userSidebar" aria-controls="userSidebar">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Desktop user controls (hidden on small screens) -->
      <div class="ms-auto d-none d-lg-flex align-items-center">
        <span class="text-light me-3">
          Hello, <strong class="text-white">{{ auth.getFullname() | titlecase }}</strong>
        </span>
        <button class="btn btn-light btn-sm fw-semibold text-primary" (click)="logout()">
          <i class="bi bi-box-arrow-right me-1"></i>Logout
        </button>
      </div>
    </div>
  </nav>

  <!-- Mobile Offcanvas Sidebar -->
  <div class="offcanvas offcanvas-end d-lg-none" tabindex="-1" id="userSidebar" aria-labelledby="userSidebarLabel">
    <div class="offcanvas-header bg-primary-theme text-white">
      <h5 class="offcanvas-title fw-bold" id="userSidebarLabel"><i class="bi bi-list me-2"></i>Menu</h5>
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
    </div>
    <div class="offcanvas-body d-flex flex-column">
      <div class="mb-4">
        <p class="text-muted mb-1">Logged in as:</p>
        <h5 class="fw-bold mb-0 text-dark">{{ auth.getFullname() | titlecase }}</h5>
        <small class="text-muted username-smallcaps">{{ auth.getUsername() }}</small>
      </div>
      <div class="mt-auto">
        <button class="btn btn-outline-danger w-100 fw-semibold" (click)="logout()" data-bs-dismiss="offcanvas">
          <i class="bi bi-box-arrow-right me-1"></i>Logout
        </button>
      </div>
    </div>
  </div>
}

<!-- Page Content -->
<div class="container pb-5">
  <router-outlet />
</div>
